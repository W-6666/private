<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司官网 - [你的公司名]</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header>
        <h1>公司名称</h1>
        <nav>
            <ul>
                <li><a href="#about">关于我们</a></li>
                <li><a href="#products">产品</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
        </nav>
    </header>

    <!-- 主内容区 -->
    <section id="about">
        <h2>关于我们</h2>
        <p>公司简介：我们是一家专注于[你的业务领域]的科技公司，致力于为客户提供[核心价值]。</p>
    </section>

    <section id="products">
        <h2>产品</h2>
        <ul>
            <li>产品1：智能解决方案</li>
            <li>产品2：数据分析平台</li>
        </ul>
    </section>

    <section id="contact">
        <h2>联系合作</h2>
        <form id="contactForm">
            <input type="text" placeholder="姓名" required>
            <input type="email" placeholder="邮箱" required>
            <textarea placeholder="留言内容" required></textarea>
            <button type="submit">发送消息</button>
        </form>
    </section>

    <!-- 页脚 -->
    <footer>
        <p>&copy; 2023 公司名称 | 电话: 123-4567 | 邮箱: contact@company.com</p>
